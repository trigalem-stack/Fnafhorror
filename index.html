<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Multiplayer Game - 99 Ночей в лесу</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { background-color: #87ceeb; color: white; overflow: hidden; width: 100vw; height: 100vh; position: fixed; }
        
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d13; z-index: 9999; color: white; text-align: center;
            justify-content: center; align-items: center; flex-direction: column; font-size: 20px; padding: 20px;
        }
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #app { display: none; }
        }

        #app { width: 100%; height: 100%; position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .screen { width: 90%; max-width: 550px; padding: 20px; background: rgba(15, 23, 42, 0.9); border: 2px solid #1e293b; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        
        h1, h2 { margin-bottom: 15px; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; font-size: 22px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 15px; text-align: center; pointer-events: auto; }
        button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; background: #0284c7; color: white; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; pointer-events: auto; }
        button:active { background: #0369a1; }
        .btn-red { background: #ef4444; }
        .btn-red:active { background: #dc2626; }
        
        .list-container { max-height: 35vh; overflow-y: auto; background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 8px; margin-bottom: 12px; border: 1px solid #1e293b; pointer-events: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .list-item button { width: auto; padding: 4px 12px; margin: 0; }

        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #game-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .hud-element { pointer-events: auto; position: absolute; }
        
        #header-info { top: 10px; left: 50%; transform: translateX(-50%); text-align: center; font-weight: bold; font-size: 16px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 1px solid #38bdf8; text-shadow: 1px 1px 2px black; }
        #title-game { top: 10px; left: 15px; font-size: 14px; font-weight: bold; color: #f43f5e; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
        #menu-exit-btn { top: 10px; right: 15px; padding: 6px 14px; font-size: 12px; width: auto; }
        
        #touch-zone-left { left: 0; top: 0; width: 50%; height: 100%; position: absolute; z-index: 6; pointer-events: auto; }
        #touch-zone-right { right: 0; top: 0; width: 50%; height: 100%; position: absolute; z-index: 6; pointer-events: auto; }
        
        #joystick-base { width: 100px; height: 100px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; position: absolute; display: none; transform: translate(-50%, -50%); z-index: 7; pointer-events: none; }
        #joystick-stick { width: 40px; height: 40px; background: rgba(56, 189, 248, 0.8); border-radius: 50%; position: absolute; top: 28px; left: 28px; pointer-events: none; }

        .action-container { right: 20px; bottom: 85px; z-index: 8; display: flex; flex-direction: row; gap: 15px; }
        .action-btn { width: 64px; height: 64px; border-radius: 50%; background: rgba(15, 23, 42, 0.75); border: 2px solid #38bdf8; color: white; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .action-btn:active { background: #0284c7; }
        #btn-attack { background: rgba(244, 63, 94, 0.75); border-color: #f43f5e; display: none; }

        #hotbar-container { bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 5px; background: rgba(15,23,42,0.8); padding: 5px; border-radius: 10px; border: 1px solid #334155; z-index: 8; }
        .hotbar-slot { width: 40px; height: 40px; border: 2px solid #475569; background: #0f172a; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; position: relative; color: #94a3b8; }
        .hotbar-slot.active { border-color: #38bdf8; background: #1e293b; color: white; }
        .slot-badge { position: absolute; bottom: 1px; right: 3px; font-size: 9px; color: #38bdf8; }
        #btn-inventory-toggle { width: 45px; height: 40px; border-radius: 6px; background: #475569; border: 1px solid #64748b; font-size: 10px; padding: 0; margin: 0; font-weight: bold; }

        #inventory-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 450px; height: 60%; background: rgba(15,23,42,0.95); border: 2px solid #38bdf8; border-radius: 12px; z-index: 99; padding: 15px; display: flex; flex-direction: column; }
        #inventory-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; overflow-y: auto; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 6px; }
        .inv-cell { aspect-ratio: 1; border: 1px dashed #334155; border-radius: 6px; background: rgba(15,23,42,0.6); }

        /* Новые стили для 3D UI (над костром и бревнами) */
        #world-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; overflow: hidden; }
        .world-label { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .world-label.visible { opacity: 1; pointer-events: auto; }
        .world-btn { background: #eab308; border: 2px solid #fde047; color: white; font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); pointer-events: auto; }
        .world-btn:active { background: #ca8a04; }
        .world-cf-info { background: rgba(0,0,0,0.7); border: 1px solid #f43f5e; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <p>📱 Пожалуйста, переверните устройство горизонтально для комфортной игры</p>
    </div>

    <div id="game-canvas" class="hidden"></div>
    
    <div id="world-ui-layer" class="hidden">
        <div id="campfire-ui" class="world-label">
            <div class="world-cf-info">🔥 Костер: <span id="w-cf-lvl">1</span> Лвл<br><span id="w-cf-hp">100</span>/100 HP</div>
            <button class="world-btn" id="w-btn-campfire" onclick="triggerCampfireDrop()">В КОСТЕР</button>
        </div>
        <div id="logs-ui-container"></div>
    </div>

    <div id="game-hud" class="hidden">
        <div id="title-game" class="hud-element">99 ночей в лесу</div>
        <div id="header-info" class="hud-element">День <span id="hud-day">1</span> | <span id="hud-time">УТРО</span></div>
        <button id="menu-exit-btn" class="hud-element btn-red" onclick="returnToMenu()">Выйти</button>
        
        <div id="touch-zone-left"></div>
        <div id="touch-zone-right"></div>
        
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        
        <div class="action-container hud-element">
            <div id="btn-attack" class="action-btn" onpointerdown="triggerAttack(event)">УДАР</div>
            <div id="btn-jump" class="action-btn" onpointerdown="triggerJump(event)">ПРЫЖОК</div>
        </div>
        
        <div id="hotbar-container" class="hud-element">
            <div class="hotbar-slot active" onclick="selectSlot(0)">🪓<div class="slot-badge">Тпр</div></div>
            <div class="hotbar-slot" onclick="selectSlot(1)">🎒<div class="slot-badge" id="bag-count-text">0/10</div></div>
            <div class="hotbar-slot" onclick="selectSlot(2)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(3)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(4)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(5)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(6)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(7)">-</div>
            <div class="hotbar-slot" onclick="selectSlot(8)">-</div>
            <button id="btn-inventory-toggle" onclick="toggleInventoryScreen(true)">ИНВ</button>
        </div>

        <div id="inventory-screen" class="hidden hud-element">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                <h3 style="color:#38bdf8; font-size:16px;">Бесконечный инвентарь (Пусто)</h3>
                <button class="btn-red" style="width:auto; padding:3px 10px; font-size:12px; margin:0;" onclick="toggleInventoryScreen(false)">Закрыть</button>
            </div>
            <div id="inventory-grid">
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
                <div class="inv-cell"></div><div class="inv-cell"></div><div class="inv-cell"></div>
            </div>
            <button class="btn-red" style="margin-top:10px; font-size:12px; padding:6px;" onclick="triggerDiscardLast()">Выкинуть последнюю вещь (Физика)</button>
        </div>
    </div>

    <div id="app">
        <div id="screen-login" class="screen">
            <h1>99 Ночей в Лесу</h1>
            <div id="login-error" class="error" style="color:#ef4444; margin-bottom:10px;"></div>
            <input type="text" id="input-nickname" placeholder="Введите ваш ник" maxlength="15">
            <button onclick="login()">Играть Онлайн</button>
            <button class="btn-red" onclick="toggleFullScreen()">На весь экран</button>
        </div>

        <div id="screen-lobbies" class="screen hidden">
            <h2>Доступные Лобби</h2>
            <input type="text" id="input-search" placeholder="Поиск комнаты..." onkeyup="filterLobbies()">
            <div id="lobbies-list" class="list-container"></div>
            <button onclick="showScreen('screen-create-lobby')">Создать лобби</button>
            <button class="btn-red" onclick="showScreen('screen-login')">Назад</button>
        </div>

        <div id="screen-create-lobby" class="screen hidden">
            <h2>Создать Новое Лобби</h2>
            <input type="text" id="create-name" placeholder="Название комнаты">
            <input type="text" id="create-password" placeholder="Пароль (если нужен)">
            <p style="margin: 8px 0; font-size:14px;">Максимум игроков (1-8): <span id="val-players" style="color:#38bdf8; font-weight:bold;">4</span></p>
            <input type="range" id="create-max" min="1" max="8" value="4" style="width:100%" oninput="document.getElementById('val-players').innerText = this.value">
            <button onclick="createLobby()">Создать и войти</button>
            <button class="btn-red" onclick="showScreen('screen-lobbies')">Отмена</button>
        </div>

        <div id="screen-room" class="screen hidden">
            <h2 id="room-name">Комната лобби</h2>
            <div id="room-players" class="list-container"></div>
            <div id="admin-controls" class="hidden">
                <button style="background:#22c55e;" onclick="startGame()">Начать Геймплей (Минимум 1 игрок)</button>
                <button class="btn-red" onclick="disbandLobby()">Распустить комнату</button>
            </div>
            <div id="player-controls">
                <button class="btn-red" onclick="leaveLobby()">Выйти из комнаты</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const socket = io();
        let myId = null;
        let allLobbies = [];
        let worldData = null; // Для хранения состояния сервера
        
        let scene, camera, renderer, sunLight, sunMesh, moonMesh;
        let clock = new THREE.Clock();
        
        let terrain, campfireMesh, campfireLight;
        let treesMap = new Map();
        let playersMap = new Map();
        let logsMap = new Map();
        
        let playerPos = new THREE.Vector3(0, 1, 4);
        let playerVelocity = new THREE.Vector3();
        let lookYaw = 0;
        let lookPitch = 0;
        let isGrounded = true;
        let selectedSlotIndex = 0;
        let localBagCount = 0;
        
        let isAttacking = false;
        let attackCooldown = false;
        let axeMeshLocal = null;
        let bagMeshLocal = null;
        
        let treeHitAnimations = {}; // Хранение анимаций ударов

        // Сенсоры
        let joystickTouchId = null;
        let joystickStartPos = { x: 0, y: 0 };
        let moveInput = { x: 0, y: 0 };

        let lookTouchId = null;
        let lastLookTouchPos = { x: 0, y: 0 };

        // Цвета неба
        const skyDay = new THREE.Color(0x60a5fa);
        const skyMorning = new THREE.Color(0xfca5a5); // Розовый рассвет/закат
        const skyNight = new THREE.Color(0x020408);

        socket.on('connect', () => { myId = socket.id; });

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('game-canvas').classList.add('hidden');
            document.getElementById('game-hud').classList.add('hidden');
            document.getElementById('world-ui-layer').classList.add('hidden');
            if(screenId) document.getElementById(screenId).classList.remove('hidden');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function login() {
            const nick = document.getElementById('input-nickname').value.trim();
            if (!nick) return alert('Пожалуйста, напишите ваш ник');
            socket.emit('setNickname', nick);
        }

        socket.on('loginSuccess', () => showScreen('screen-lobbies'));

        function createLobby() {
            const name = document.getElementById('create-name').value.trim();
            if (!name) return alert('Введите название лобби');
            const password = document.getElementById('create-password').value.trim();
            const maxPlayers = parseInt(document.getElementById('create-max').value);
            socket.emit('createLobby', { name, password, maxPlayers });
        }

        function filterLobbies() {
            const search = document.getElementById('input-search').value.toLowerCase();
            renderLobbies(allLobbies.filter(l => l.name.toLowerCase().includes(search)));
        }

        socket.on('updateLobbyList', (lobbies) => {
            allLobbies = lobbies;
            filterLobbies();
        });

        function renderLobbies(lobbies) {
            const container = document.getElementById('lobbies-list');
            container.innerHTML = '';
            lobbies.forEach(l => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span><b>${l.name}</b> ${l.hasPassword ? '🔒' : ''} (${l.playersCount}/${l.maxPlayers})</span>
                    <button onclick="joinLobby('${l.id}', ${l.hasPassword})">Войти</button>
                `;
                container.appendChild(div);
            });
            if(lobbies.length === 0) container.innerHTML = '<p style="font-size:12px;color:#64748b;">Нет свободных комнат</p>';
        }

        function joinLobby(id, hasPassword) {
            let password = '';
            if (hasPassword) {
                password = prompt('Пароль к комнате:');
                if (password === null) return;
            }
            socket.emit('joinLobby', { id, password });
        }

        socket.on('lobbyJoined', updateRoomUI);
        socket.on('lobbyUpdated', updateRoomUI);

        function updateRoomUI(lobby) {
            showScreen('screen-room');
            document.getElementById('room-name').innerText = `Лобби: ${lobby.name}`;
            const isAdmin = lobby.admin === myId;
            
            document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
            document.getElementById('player-controls').classList.toggle('hidden', isAdmin);

            const playersDiv = document.getElementById('room-players');
            playersDiv.innerHTML = '';
            lobby.players.forEach(p => {
                const isPlayerAdmin = p.id === lobby.admin;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${p.name} ${isPlayerAdmin ? '👑' : ''}</span>`;
                if (isAdmin && p.id !== myId) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-red';
                    btn.innerText = 'Кик';
                    btn.onclick = () => socket.emit('kickPlayer', p.id);
                    div.appendChild(btn);
                }
                playersDiv.appendChild(div);
            });
        }

        function leaveLobby() { socket.emit('leaveLobby'); showScreen('screen-lobbies'); }
        function disbandLobby() { socket.emit('disbandLobby'); }
        function startGame() { socket.emit('startGame'); }

        socket.on('lobbyDisbanded', () => { alert('Лобби распущено'); showScreen('screen-lobbies'); });
        socket.on('kicked', () => { alert('Вы были исключены из комнаты'); showScreen('screen-lobbies'); });

        socket.on('gameStarted', () => {
            document.getElementById('app').classList.add('hidden');
            document.getElementById('game-canvas').classList.remove('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            document.getElementById('world-ui-layer').classList.remove('hidden');
            init3DGameWorld();
        });

        function returnToMenu() {
            location.reload(); 
        }

        function init3DGameWorld() {
            if(scene) return;

            const container = document.getElementById('game-canvas');
            scene = new THREE.Scene();
            scene.background = skyDay.clone();
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.04);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            // Солнце и луна (источник света)
            sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.castShadow = true;
            scene.add(sunLight);
            
            // Физические объекты в небе
            const sunGeo = new THREE.SphereGeometry(4, 16, 16);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffe600 });
            sunMesh = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sunMesh);

            const moonGeo = new THREE.SphereGeometry(3, 16, 16);
            const moonMat = new THREE.MeshBasicMaterial({ color: 0xcdd5e0 });
            moonMesh = new THREE.Mesh(moonGeo, moonMat);
            scene.add(moonMesh);

            const floorGeo = new THREE.PlaneGeometry(150, 150);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1e3f20, roughness: 0.9 });
            terrain = new THREE.Mesh(floorGeo, floorMat);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            createLocalTools();
            setupMobileTouchControls();

            clock.start();
            animateLoop();
        }

        function createLocalTools() {
            axeMeshLocal = new THREE.Group();
            
            const handleGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.6);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.y = 0;
            axeMeshLocal.add(handle);

            const bladeGeo = new THREE.BoxGeometry(0.18, 0.1, 0.03);
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0x9ca3af, metalness: 0.5 });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.set(0.06, 0.25, 0); 
            axeMeshLocal.add(blade);

            axeMeshLocal.rotation.z = -Math.PI / 6;
            axeMeshLocal.rotation.x = -Math.PI / 8;
            axeMeshLocal.position.set(0.3, -0.3, -0.6);
            camera.add(axeMeshLocal);
            scene.add(camera); 

            bagMeshLocal = new THREE.Group();
            const sackGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const sackMat = new THREE.MeshStandardMaterial({ color: 0xd97706 });
            const sack = new THREE.Mesh(sackGeo, sackMat);
            bagMeshLocal.add(sack);
            bagMeshLocal.position.set(0.3, -0.35, -0.5);
            bagMeshLocal.visible = false;
            camera.add(bagMeshLocal);

            updateHUDButtonsVisibility();
        }

        socket.on('worldSync', (world) => {
            if(!scene) return;
            worldData = world;

            document.getElementById('hud-day').innerText = world.day;
            document.getElementById('hud-time').innerText = world.isNight ? "НОЧЬ" : "ДЕНЬ";
            document.getElementById('w-cf-hp').innerText = Math.floor(world.campfire.hp);
            document.getElementById('w-cf-lvl').innerText = world.campfire.level;

            if (!campfireMesh) {
                campfireMesh = new THREE.Group();
                const stoneGeo = new THREE.DodecahedronGeometry(0.25);
                const stoneMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                for(let a=0; a<Math.PI*2; a+=Math.PI/3) {
                    const st = new THREE.Mesh(stoneGeo, stoneMat);
                    st.position.set(Math.cos(a)*0.6, 0.1, Math.sin(a)*0.6);
                    campfireMesh.add(st);
                }
                const logGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5);
                const logMat = new THREE.MeshStandardMaterial({ color: 0x3d2314 });
                const lg1 = new THREE.Mesh(logGeo, logMat); lg1.rotation.z = 1; lg1.position.y=0.1;
                const lg2 = new THREE.Mesh(logGeo, logMat); lg2.rotation.x = 1; lg2.position.y=0.1;
                campfireMesh.add(lg1, lg2);

                campfireMesh.position.set(world.campfire.x, 0, world.campfire.z);
                scene.add(campfireMesh);

                campfireLight = new THREE.PointLight(0xff7722, 2, 15);
                campfireLight.position.set(world.campfire.x, 1.2, world.campfire.z);
                scene.add(campfireLight);
            }

            if(world.campfire.hp <= 0) {
                campfireLight.intensity = 0;
            } else {
                campfireLight.intensity = 1.5 + (world.campfire.level * 0.8) * (world.campfire.hp / 100);
                campfireLight.distance = 12 + world.campfire.level * 4;
            }

            world.trees.forEach(t => {
                if (!treesMap.has(t.id)) {
                    const treeGroup = new THREE.Group();
                    const trunkGeo = new THREE.CylinderGeometry(0.25, 0.35, 4, 6);
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2f13 });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.y = 2;
                    treeGroup.add(trunk);

                    const leavesGeo = new THREE.ConeGeometry(1.5, 3, 5);
                    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x14532d, roughness: 0.8 });
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.y = 4;
                    treeGroup.add(leaves);

                    treeGroup.position.set(t.x, 0, t.z);
                    scene.add(treeGroup);
                    treesMap.set(t.id, treeGroup);
                }
                const mesh = treesMap.get(t.id);
                // Если по дереву бьют, добавляем анимацию
                if(treeHitAnimations[t.id] > 0) {
                    mesh.position.y = t.sinkY - 0.2; // Дерево немного опускается при ударе
                } else {
                    mesh.position.y = t.sinkY;
                }
            });

            for(let [id, m] of logsMap.entries()) {
                if (!world.droppedLogs.find(l => l.id === id)) {
                    scene.remove(m);
                    logsMap.delete(id);
                }
            }
            world.droppedLogs.forEach(l => {
                if (!logsMap.has(l.id)) {
                    const logItemGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 6);
                    logItemGeo.rotateZ(Math.PI/2);
                    const logItemMat = new THREE.MeshStandardMaterial({ color: 0xd97706 });
                    const logItemMesh = new THREE.Mesh(logItemGeo, logItemMat);
                    scene.add(logItemMesh);
                    logsMap.set(l.id, logItemMesh);
                }
                const m = logsMap.get(l.id);
                m.position.set(l.x, l.y, l.z);
            });
        });

        socket.on('playersSync', (serverPlayers) => {
            if(!scene) return;
            serverPlayers.forEach(p => {
                if(p.id === myId) return;
                if(!playersMap.has(p.id)) {
                    const pGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.8, 8);
                    const pMat = new THREE.MeshStandardMaterial({ color: p.color });
                    const pMesh = new THREE.Mesh(pGeo, pMat);
                    const hGeo = new THREE.SphereGeometry(0.22, 8, 8);
                    const hMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
                    const hMesh = new THREE.Mesh(hGeo, hMat);
                    hMesh.position.y = 1.1;
                    pMesh.add(hMesh);
                    scene.add(pMesh);
                    playersMap.set(p.id, pMesh);
                }
                const mesh = playersMap.get(p.id);
                mesh.position.set(p.x, p.y, p.z);
                mesh.rotation.y = p.ry;
            });

            for(let [id, mesh] of playersMap.entries()) {
                if(!serverPlayers.find(p => p.id === id)) {
                    scene.remove(mesh);
                    playersMap.delete(id);
                }
            }
        });

        socket.on('bagSync', (count) => {
            localBagCount = count;
            document.getElementById('bag-count-text').innerText = `${count}/10`;
        });

        socket.on('treeHit', (treeId) => {
            treeHitAnimations[treeId] = 0.15; // Анимация длится 0.15 секунд
        });

        function setupMobileTouchControls() {
            const zLeft = document.getElementById('touch-zone-left');
            const zRight = document.getElementById('touch-zone-right');

            zLeft.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                if (joystickTouchId !== null) return; 

                for(let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    joystickTouchId = touch.identifier;
                    joystickStartPos = { x: touch.clientX, y: touch.clientY };
                    
                    const base = document.getElementById('joystick-base');
                    base.style.left = touch.clientX + 'px';
                    base.style.top = touch.clientY + 'px';
                    base.style.display = 'block';
                    break;
                }
            }, { passive: false });

            zLeft.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (joystickTouchId === null) return;

                for(let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === joystickTouchId) {
                        let dx = touch.clientX - joystickStartPos.x;
                        let dy = touch.clientY - joystickStartPos.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let maxDist = 40;

                        if(dist > maxDist) {
                            dx = (dx / dist) * maxDist;
                            dy = (dy / dist) * maxDist;
                        }

                        document.getElementById('joystick-stick').style.transform = `translate(${dx}px, ${dy}px)`;
                        moveInput.x = dx / maxDist;
                        moveInput.y = -dy / maxDist;
                        break;
                    }
                }
            }, { passive: false });

            const resetJoystick = (e) => {
                e.preventDefault();
                if (joystickTouchId === null) return;
                
                for(let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        joystickTouchId = null;
                        moveInput = { x: 0, y: 0 };
                        document.getElementById('joystick-base').style.display = 'none';
                        document.getElementById('joystick-stick').style.transform = 'translate(0px, 0px)';
                        break;
                    }
                }
            };
            zLeft.addEventListener('touchend', resetJoystick, { passive: false });
            zLeft.addEventListener('touchcancel', resetJoystick, { passive: false });

            zRight.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (lookTouchId !== null) return;

                for(let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    lookTouchId = touch.identifier;
                    lastLookTouchPos = { x: touch.clientX, y: touch.clientY };
                    break;
                }
            }, { passive: false });

            zRight.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (lookTouchId === null) return;

                for(let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === lookTouchId) {
                        let dx = touch.clientX - lastLookTouchPos.x;
                        let dy = touch.clientY - lastLookTouchPos.y;

                        lookYaw -= dx * 0.005;
                        lookPitch -= dy * 0.005;
                        
                        // ИСПРАВЛЕНИЕ: Жёсткое ограничение камеры (чтобы не сломать шею)
                        const pitchLimit = Math.PI / 2.2; 
                        lookPitch = Math.max(-pitchLimit, Math.min(pitchLimit, lookPitch));

                        lastLookTouchPos = { x: touch.clientX, y: touch.clientY };
                        break;
                    }
                }
            }, { passive: false });

            const stopLook = (e) => {
                e.preventDefault();
                if (lookTouchId === null) return;
                
                for(let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === lookTouchId) {
                        lookTouchId = null;
                        break;
                    }
                }
            };
            zRight.addEventListener('touchend', stopLook, { passive: false });
            zRight.addEventListener('touchcancel', stopLook, { passive: false });
        }

        // Вспомогательная функция для проекции 3D координат в 2D (на экран)
        function toScreenPosition(vector, camera) {
            let widthHalf = 0.5 * window.innerWidth;
            let heightHalf = 0.5 * window.innerHeight;
            let tempVec = vector.clone().project(camera);
            return {
                x: (tempVec.x * widthHalf) + widthHalf,
                y: -(tempVec.y * heightHalf) + heightHalf,
                z: tempVec.z // если z > 1, объект сзади камеры
            };
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            if(!scene) return;

            let dt = clock.getDelta();

            // Обновление таймеров анимации удара по дереву
            for (let id in treeHitAnimations) {
                if (treeHitAnimations[id] > 0) {
                    treeHitAnimations[id] -= dt;
                }
            }

            // Обновление цикла дня и ночи
            if(worldData) {
                let cycleRatio = worldData.timeProgress / (6 * 60 * 1000); // 0 to 1
                let angle = cycleRatio * Math.PI * 2;
                
                // Вращаем солнце и луну
                sunMesh.position.set(Math.cos(angle)*50, Math.sin(angle)*50, 0);
                moonMesh.position.set(Math.cos(angle + Math.PI)*50, Math.sin(angle + Math.PI)*50, 0);
                sunLight.position.copy(sunMesh.position);

                // Плавно меняем цвет неба
                if (Math.sin(angle) > 0.2) {
                    scene.background.lerpColors(skyMorning, skyDay, (Math.sin(angle) - 0.2) * 1.5);
                } else if (Math.sin(angle) > 0) {
                    scene.background.lerpColors(skyNight, skyMorning, Math.sin(angle) * 5);
                } else {
                    scene.background.copy(skyNight);
                }
                scene.fog.color.copy(scene.background);
            }

            let forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), lookYaw);
            let side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), lookYaw);
            
            playerVelocity.x = (forward.x * moveInput.y + side.x * moveInput.x) * 4.5;
            playerVelocity.z = (forward.z * moveInput.y + side.z * moveInput.x) * 4.5;

            if (!isGrounded) {
                playerVelocity.y -= 15.0 * dt; 
            } else {
                playerVelocity.y = 0;
            }

            let nextX = playerPos.x + playerVelocity.x * dt;
            let nextZ = playerPos.z + playerVelocity.z * dt;

            // ИСПРАВЛЕНИЕ: Коллизия со стволами деревьев
            if(worldData) {
                worldData.trees.forEach(t => {
                    if(!t.isCut) {
                        let dx = nextX - t.x;
                        let dz = nextZ - t.z;
                        let dist = Math.sqrt(dx*dx + dz*dz);
                        let trunkRadius = 0.55; 
                        if (dist < trunkRadius) {
                            let overlap = trunkRadius - dist;
                            nextX += (dx / dist) * overlap;
                            nextZ += (dz / dist) * overlap;
                        }
                    }
                });
            }

            playerPos.x = nextX;
            playerPos.z = nextZ;
            playerPos.y += playerVelocity.y * dt;

            if(playerPos.y <= 1.5) {
                playerPos.y = 1.5; 
                isGrounded = true;
            }

            playerPos.x = Math.max(-70, Math.min(70, playerPos.x));
            playerPos.z = Math.max(-70, Math.min(70, playerPos.z));

            camera.position.copy(playerPos);
            camera.rotation.set(0, 0, 0);
            camera.rotation.y = lookYaw;
            camera.rotation.x = lookPitch;

            if(isAttacking && axeMeshLocal) {
                axeMeshLocal.rotation.x += 10 * dt;
                if(axeMeshLocal.rotation.x >= 0.5) {
                    isAttacking = false;
                }
            } else if(axeMeshLocal) {
                axeMeshLocal.rotation.x = THREE.MathUtils.lerp(axeMeshLocal.rotation.x, -Math.PI / 8, 0.2);
            }

            update3DWorldUI();

            socket.emit('playerUpdate', {
                x: playerPos.x,
                y: playerPos.y,
                z: playerPos.z,
                ry: lookYaw,
                activeSlot: selectedSlotIndex,
                bagCount: localBagCount
            });

            renderer.render(scene, camera);
        }

        // ИСПРАВЛЕНИЕ: Интерфейс кнопок сбора и костра прямо в 3D мире
        function update3DWorldUI() {
            if(!worldData) return;

            // 1. Костер (Только если есть бревна в мешке и мы рядом)
            const cfUI = document.getElementById('campfire-ui');
            let dCf = playerPos.distanceTo(new THREE.Vector3(worldData.campfire.x, playerPos.y, worldData.campfire.z));
            let cfScreenPos = toScreenPosition(new THREE.Vector3(worldData.campfire.x, 2.5, worldData.campfire.z), camera);
            
            if (dCf < 4 && cfScreenPos.z < 1) {
                cfUI.classList.add('visible');
                cfUI.style.left = cfScreenPos.x + 'px';
                cfUI.style.top = cfScreenPos.y + 'px';
                
                const btn = document.getElementById('w-btn-campfire');
                if (localBagCount > 0) {
                    btn.style.display = 'block';
                } else {
                    btn.style.display = 'none';
                }
            } else {
                cfUI.classList.remove('visible');
            }

            // 2. Бревна (Кнопки над каждым бревном)
            const logsContainer = document.getElementById('logs-ui-container');
            let activeLogsHtml = '';
            
            if (selectedSlotIndex === 1 && localBagCount < 10) {
                worldData.droppedLogs.forEach(l => {
                    let dLog = playerPos.distanceTo(new THREE.Vector3(l.x, playerPos.y, l.z));
                    let logScreenPos = toScreenPosition(new THREE.Vector3(l.x, l.y + 0.5, l.z), camera);
                    
                    if (dLog < 3.5 && logScreenPos.z < 1) {
                        activeLogsHtml += `<div class="world-label visible" style="left:${logScreenPos.x}px; top:${logScreenPos.y}px;">
                            <button class="world-btn" onpointerdown="triggerCollectSpecific('${l.id}', event)">СОБРАТЬ</button>
                        </div>`;
                    }
                });
            }
            logsContainer.innerHTML = activeLogsHtml;
        }

        function selectSlot(index) {
            selectedSlotIndex = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => {
                s.classList.toggle('active', idx === index);
            });
            updateHUDButtonsVisibility();
        }

        function updateHUDButtonsVisibility() {
            if(!axeMeshLocal || !bagMeshLocal) return;
            
            if(selectedSlotIndex === 0) { 
                axeMeshLocal.visible = true;
                bagMeshLocal.visible = false;
                document.getElementById('btn-attack').style.display = 'flex';
            } else if(selectedSlotIndex === 1) { 
                axeMeshLocal.visible = false;
                bagMeshLocal.visible = true;
                document.getElementById('btn-attack').style.display = 'none';
            } else {
                axeMeshLocal.visible = false;
                bagMeshLocal.visible = false;
                document.getElementById('btn-attack').style.display = 'none';
            }
        }

        let closestTreeId = null;

        function triggerAttack(e) {
            if(e) e.preventDefault();
            if(attackCooldown || selectedSlotIndex !== 0 || !worldData) return;
            
            isAttacking = true;
            attackCooldown = true;

            let minDistTree = 3.0; 
            closestTreeId = null;
            worldData.trees.forEach(t => {
                if(t.isCut) return;
                let d = playerPos.distanceTo(new THREE.Vector3(t.x, playerPos.y, t.z));
                if (d < minDistTree) {
                    minDistTree = d;
                    closestTreeId = t.id;
                }
            });

            if (closestTreeId) {
                socket.emit('hitTree', closestTreeId);
            }

            setTimeout(() => {
                attackCooldown = false;
            }, 400);
        }

        function triggerJump(e) {
            if(e) e.preventDefault();
            if(isGrounded) {
                playerVelocity.y = 5.0;
                isGrounded = false;
            }
        }

        // Сбор конкретного бревна из 3D интерфейса
        function triggerCollectSpecific(logId, e) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            if (selectedSlotIndex === 1 && localBagCount < 10) {
                socket.emit('collectLog', logId);
            }
        }

        // Кинуть бревно в костер из 3D интерфейса
        function triggerCampfireDrop() {
            if (localBagCount > 0) {
                socket.emit('dropLog', 'campfire');
            }
        }

        function triggerDiscardLast() {
            if(localBagCount > 0) {
                socket.emit('dropLog', 'ground');
            } else {
                alert("Ваш мешок пуст!");
            }
        }

        function toggleInventoryScreen(show) {
            document.getElementById('inventory-screen').classList.toggle('hidden', !show);
        }
    </script>
