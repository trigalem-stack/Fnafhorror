<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Multiplayer Game</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; color: white; overflow: hidden; width: 100vw; height: 100vh; }
        
        /* Принудительный горизонтальный режим */
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; color: white; text-align: center;
            justify-content: center; align-items: center; flex-direction: column; font-size: 24px;
        }
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #app { display: none; }
        }

        /* Интерфейс */
        #app { width: 100%; height: 100%; position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .screen { width: 100%; max-width: 600px; padding: 20px; background: rgba(0,0,0,0.8); border-radius: 15px; text-align: center; }
        .hidden { display: none !important; }
        
        h1, h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #007bff; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        .btn-red { background: #dc3545; }
        .btn-red:active { background: #a71d2a; }
        
        /* Списки */
        .list-container { max-height: 40vh; overflow-y: auto; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; margin-bottom: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .list-item:last-child { border-bottom: none; }
        .list-item button { width: auto; padding: 5px 15px; margin: 0; }

        /* Окно игры */
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #game-ui { position: absolute; top: 10px; left: 10px; z-index: 20; }
        #game-ui button { width: auto; padding: 10px 20px; }

        .error { color: #ff4d4d; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <p>📱 Пожалуйста, поверните телефон горизонтально</p>
    </div>

    <!-- Контейнер для Three.js -->
    <div id="game-canvas" class="hidden"></div>
    <div id="game-ui" class="hidden">
        <button class="btn-red" onclick="returnToMenu()">Выйти в меню</button>
    </div>

    <div id="app">
        <!-- Главное меню -->
        <div id="screen-login" class="screen">
            <h1>Моя 3D Игра</h1>
            <div id="login-error" class="error"></div>
            <input type="text" id="input-nickname" placeholder="Введите ваш ник" maxlength="15">
            <button onclick="login()">Играть онлайн</button>
            <button onclick="toggleFullScreen()">На весь экран</button>
        </div>

        <!-- Список лобби -->
        <div id="screen-lobbies" class="screen hidden">
            <h2>Доступные игры</h2>
            <input type="text" id="input-search" placeholder="Поиск по имени..." onkeyup="filterLobbies()">
            <div id="lobbies-list" class="list-container"></div>
            <button onclick="showScreen('screen-create-lobby')">Создать лобби</button>
            <button class="btn-red" onclick="showScreen('screen-login')">Назад</button>
        </div>

        <!-- Создание лобби -->
        <div id="screen-create-lobby" class="screen hidden">
            <h2>Создать лобби</h2>
            <input type="text" id="create-name" placeholder="Название комнаты">
            <input type="text" id="create-password" placeholder="Пароль (необязательно)">
            <p style="margin: 10px 0;">Игроков (2-8): <span id="val-players">4</span></p>
            <input type="range" id="create-max" min="2" max="8" value="4" style="width:100%" oninput="document.getElementById('val-players').innerText = this.value">
            <button onclick="createLobby()">Создать</button>
            <button class="btn-red" onclick="showScreen('screen-lobbies')">Отмена</button>
        </div>

        <!-- Внутри лобби -->
        <div id="screen-room" class="screen hidden">
            <h2 id="room-name">Лобби</h2>
            <div id="room-players" class="list-container"></div>
            <div id="admin-controls" class="hidden">
                <button onclick="startGame()">Начать игру</button>
                <button class="btn-red" onclick="disbandLobby()">Распустить комнату</button>
            </div>
            <div id="player-controls">
                <button class="btn-red" onclick="leaveLobby()">Выйти из комнаты</button>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const socket = io();
        let myId = null;
        let allLobbies = [];
        let scene, camera, renderer, cube; // Для Three.js

        socket.on('connect', () => { myId = socket.id; });

        // Управление экранами
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-login').parentElement.classList.remove('hidden');
            document.getElementById('game-canvas').classList.add('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            
            if(screenId) document.getElementById(screenId).classList.remove('hidden');
        }

        // Ошибки
        function showError(elementId, msg) {
            const el = document.getElementById(elementId);
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 3000);
        }
        socket.on('errorMsg', (msg) => alert(msg));

        // Полноэкранный режим
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Ошибка полноэкранного режима: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // --- ЛОГИКА МЕНЮ И ЛОББИ ---

        function login() {
            const nick = document.getElementById('input-nickname').value.trim();
            if (!nick) return showError('login-error', 'Введите ник!');
            socket.emit('setNickname', nick);
        }

        socket.on('loginSuccess', () => showScreen('screen-lobbies'));

        function createLobby() {
            const name = document.getElementById('create-name').value.trim();
            if (!name) return alert('Введите название комнаты');
            const password = document.getElementById('create-password').value.trim();
            const maxPlayers = document.getElementById('create-max').value;
            socket.emit('createLobby', { name, password, maxPlayers });
        }

        function filterLobbies() {
            const search = document.getElementById('input-search').value.toLowerCase();
            renderLobbies(allLobbies.filter(l => l.name.toLowerCase().includes(search)));
        }

        socket.on('updateLobbyList', (lobbies) => {
            allLobbies = lobbies;
            filterLobbies();
        });

        function renderLobbies(lobbies) {
            const container = document.getElementById('lobbies-list');
            container.innerHTML = '';
            lobbies.forEach(l => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span><b>${l.name}</b> ${l.hasPassword ? '🔒' : ''} (${l.playersCount}/${l.maxPlayers})</span>
                    <button onclick="joinLobby('${l.id}', ${l.hasPassword})">Войти</button>
                `;
                container.appendChild(div);
            });
            if(lobbies.length === 0) container.innerHTML = '<p>Нет доступных игр</p>';
        }

        function joinLobby(id, hasPassword) {
            let password = '';
            if (hasPassword) {
                password = prompt('Введите пароль:');
                if (password === null) return;
            }
            socket.emit('joinLobby', { id, password });
        }

        // Обновление внутри комнаты
        socket.on('lobbyJoined', updateRoomUI);
        socket.on('lobbyUpdated', updateRoomUI);

        function updateRoomUI(lobby) {
            showScreen('screen-room');
            document.getElementById('room-name').innerText = `Лобби: ${lobby.name}`;
            const isAdmin = lobby.admin === myId;
            
            document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
            document.getElementById('player-controls').classList.toggle('hidden', isAdmin);

            const playersDiv = document.getElementById('room-players');
            playersDiv.innerHTML = '';
            lobby.players.forEach(p => {
                const isPlayerAdmin = p.id === lobby.admin;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${p.name} ${isPlayerAdmin ? '(Админ) 👑' : ''}</span>`;
                
                // Кнопка кика только для админа и не на самого себя
                if (isAdmin && p.id !== myId) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-red';
                    btn.innerText = 'Кик';
                    btn.onclick = () => socket.emit('kickPlayer', p.id);
                    div.appendChild(btn);
                }
                playersDiv.appendChild(div);
            });
        }

        // Действия в комнате
        function leaveLobby() { socket.emit('leaveLobby'); showScreen('screen-lobbies'); }
        function disbandLobby() { socket.emit('disbandLobby'); }
        function startGame() { socket.emit('startGame'); }

        socket.on('lobbyDisbanded', () => {
            alert('Лобби распущено админом');
            showScreen('screen-lobbies');
        });

        socket.on('kicked', () => {
            alert('Вас кикнули из лобби');
            showScreen('screen-lobbies');
        });

        socket.on('gameStarted', () => {
            // Прячем весь интерфейс меню
            document.getElementById('app').parentElement.querySelector('#app').classList.add('hidden');
            document.getElementById('game-canvas').classList.remove('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            initGame(); // Запускаем 3D
        });

        function returnToMenu() {
            socket.emit('leaveLobby'); // Выходим из игры/лобби
            document.getElementById('app').classList.remove('hidden');
            showScreen('screen-lobbies');
        }

        // --- THREE JS (БАЗОВЫЙ ГЕЙМПЛЕЙ) ---
        function initGame() {
            if(scene) return; // Чтобы не создавать дважды
            const canvas = document.getElementById('game-canvas');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            canvas.appendChild(renderer.domElement);

            // Просто крутящийся куб для теста
            const geometry = new THREE.BoxGeometry();
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        // Адаптация 3D под изменение размера окна
        window.addEventListener('resize', () => {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
