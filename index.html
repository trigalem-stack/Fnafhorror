<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>99 Ночей в Лесу</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; color: white; overflow: hidden; width: 100vw; height: 100vh; touch-action: none; user-select: none; }
        
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; color: white; text-align: center;
            justify-content: center; align-items: center; flex-direction: column; font-size: 24px;
        }
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
            #app, #game-container { display: none !important; }
        }

        #app { width: 100%; height: 100%; position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .screen { width: 90%; max-width: 500px; padding: 20px; background: rgba(0,0,0,0.85); border-radius: 15px; text-align: center; }
        .hidden { display: none !important; }
        
        h1, h2 { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #007bff; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; transform: scale(0.97); }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }
        
        .list-container { max-height: 35vh; overflow-y: auto; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; margin-bottom: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .list-item:last-child { border-bottom: none; }
        .list-item button { width: auto; padding: 5px 12px; margin: 0; font-size: 12px; }
        .error { color: #ff4d4d; margin-bottom: 10px; font-weight: bold; font-size: 14px; }

        /* ===== GAME UI ===== */
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        #game-canvas { width: 100%; height: 100%; }
        
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 101; }
        #game-ui > * { pointer-events: auto; }

        /* Верхняя панель */
        #top-bar { position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-start; padding: 8px; }
        #day-counter { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        #game-title { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; font-size: 12px; color: #ffcc00; }
        #btn-exit { background: rgba(220,53,69,0.8); border: none; color: white; padding: 5px 12px; border-radius: 8px; font-size: 12px; }
        /* Слоты внизу */
        #bottom-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; align-items: center; }
        .slot { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; }
        .slot.active { border-color: #ffcc00; background: rgba(255,204,0,0.2); }
        .slot-count { position: absolute; bottom: 1px; right: 2px; font-size: 9px; color: #fff; }
        #btn-inventory { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Джойстик */
        #joystick-zone { position: absolute; top: 0; left: 0; width: 50%; height: 100%; pointer-events: auto; }
        #joystick-base { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); display: none; }
        #joystick-thumb { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.5); top: 30px; left: 30px; }

        /* Правая зона (камера + кнопки) */
        #right-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
        
        #btn-attack { position: absolute; bottom: 80px; right: 20px; width: 65px; height: 65px; border-radius: 50%; background: rgba(220,53,69,0.7); border: 2px solid rgba(255,255,255,0.4); color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #btn-jump { position: absolute; bottom: 160px; right: 25px; width: 55px; height: 55px; border-radius: 50%; background: rgba(0,123,255,0.7); border: 2px solid rgba(255,255,255,0.4); color: white; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Кнопка собрать */
        #btn-collect { position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); padding: 8px 20px; background: rgba(40,167,69,0.8); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: bold; display: none; }

        /* Кнопка выкинуть */
        #btn-drop { position: absolute; bottom: 60px; right: 100px; padding: 6px 14px; background: rgba(255,165,0,0.8); border: none; border-radius: 8px; color: white; font-size: 11px; font-weight: bold; display: none; }

        /* Счётчик мешка */
        #bag-counter { position: absolute; bottom: 105px; right: 20px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 6px; font-size: 11px; display: none; }

        /* Инвентарь */
        #inventory-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 80%; max-width: 350px; background: rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 15px; display: none; z-index: 200; }
        #inventory-panel h3 { margin-bottom: 10px; font-size: 16px; }
        #inventory-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; max-height: 50vh; overflow-y: auto; }
        .inv-slot { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #btn-close-inv { margin-top: 10px; padding: 8px; background: #dc3545; border: none; border-radius: 8px; color: white; font-size: 13px; width: 100%; }

        /* HP бар костра */
        #campfire-info { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 8px; font-size: 12px; display: none; text-align: center; }
        #campfire-hp-bar { width: 100px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 3px; }
        #campfire-hp-fill { width: 100%; height: 100%; background: #ff6600; border-radius: 3px; transition: width 0.2s; }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <p>📱 Поверните телефон горизонтально</p>
    </div>

    <!-- GAME -->
    <div id="game-container" class="hidden">
        <div id="game-canvas"></div>
        <div id="game-ui">            <div id="top-bar">
                <div>
                    <div id="day-counter">День 1 | ☀️ Утро</div>
                    <div id="game-title">🌲 99 Ночей в Лесу 🌲</div>
                </div>
                <button id="btn-exit" onclick="exitGame()">✕ Выход</button>
            </div>

            <div id="campfire-info">
                🔥 Костёр | Ур. <span id="cf-level">1</span><br>
                <div id="campfire-hp-bar"><div id="campfire-hp-fill"></div></div>
                <span id="cf-hp-text">100/100 HP</span>
            </div>

            <div id="joystick-zone">
                <div id="joystick-base"><div id="joystick-thumb"></div></div>
            </div>
            <div id="right-zone"></div>

            <div id="btn-attack" style="display:none;" ontouchstart="onAttack()" onmousedown="onAttack()">⚔️ УДАР</div>
            <div id="btn-jump" ontouchstart="onJump()" onmousedown="onJump()">🦘 ПРЫЖ</div>
            <button id="btn-collect" ontouchstart="onCollect()" onmousedown="onCollect()">📦 Собрать</button>
            <button id="btn-drop" ontouchstart="onDrop()" onmousedown="onDrop()">🗑️ Выкинуть</button>
            <div id="bag-counter">🎒 <span id="bag-count">0</span>/10</div>

            <div id="bottom-bar">
                <div class="slot active" id="slot-0">🪓</div>
                <div class="slot" id="slot-1">🎒</div>
                <div class="slot" id="slot-2"></div>
                <div class="slot" id="slot-3"></div>
                <div class="slot" id="slot-4"></div>
                <div class="slot" id="slot-5"></div>
                <div class="slot" id="slot-6"></div>
                <div class="slot" id="slot-7"></div>
                <div class="slot" id="slot-8"></div>
                <div id="btn-inventory" ontouchstart="toggleInventory()" onmousedown="toggleInventory()">📋</div>
            </div>

            <div id="inventory-panel">
                <h3>📋 Инвентарь</h3>
                <div id="inventory-grid"></div>
                <button id="btn-close-inv" ontouchstart="toggleInventory()" onmousedown="toggleInventory()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- MENU -->
    <div id="app">
        <div id="screen-login" class="screen">
            <h1>🌲 99 Ночей в Лесу</h1>            <div id="login-error" class="error"></div>
            <input type="text" id="input-nickname" placeholder="Введите ваш ник" maxlength="15">
            <button onclick="login()">Играть онлайн</button>
            <button onclick="toggleFullScreen()">На весь экран</button>
        </div>

        <div id="screen-lobbies" class="screen hidden">
            <h2>🏠 Доступные игры</h2>
            <input type="text" id="input-search" placeholder="Поиск..." onkeyup="filterLobbies()">
            <div id="lobbies-list" class="list-container"></div>
            <button onclick="showScreen('screen-create-lobby')">Создать лобби</button>
            <button class="btn-red" onclick="showScreen('screen-login')">Назад</button>
        </div>

        <div id="screen-create-lobby" class="screen hidden">
            <h2>Создать лобби</h2>
            <input type="text" id="create-name" placeholder="Название комнаты">
            <input type="text" id="create-password" placeholder="Пароль (необязательно)">
            <p style="margin:10px 0;">Игроков (1-8): <span id="val-players">4</span></p>
            <input type="range" id="create-max" min="1" max="8" value="4" style="width:100%" oninput="document.getElementById('val-players').innerText=this.value">
            <button class="btn-green" onclick="createLobby()">Создать</button>
            <button class="btn-red" onclick="showScreen('screen-lobbies')">Отмена</button>
        </div>

        <div id="screen-room" class="screen hidden">
            <h2 id="room-name">Лобби</h2>
            <div id="room-players" class="list-container"></div>
            <div id="admin-controls" class="hidden">
                <button class="btn-green" onclick="startGame()">▶️ Начать игру</button>
                <button class="btn-red" onclick="disbandLobby()">Распустить</button>
            </div>
            <div id="player-controls">
                <button class="btn-red" onclick="leaveLobby()">Выйти</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ===================== NETWORKING =====================
    const socket = io();
    let myId = null;
    let myNickname = '';
    let allLobbies = [];
    let currentLobbyData = null;

    socket.on('connect', () => { myId = socket.id; });
    socket.on('errorMsg', (msg) => alert(msg));
    // ===================== MENU =====================
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('game-container').classList.add('hidden');
        if (screenId) document.getElementById(screenId).classList.remove('hidden');
    }

    function showError(elId, msg) {
        const el = document.getElementById(elId);
        el.innerText = msg;
        setTimeout(() => el.innerText = '', 3000);
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        else if (document.exitFullscreen) document.exitFullscreen();
    }

    function login() {
        const nick = document.getElementById('input-nickname').value.trim();
        if (!nick) return showError('login-error', 'Введите ник!');
        myNickname = nick;
        socket.emit('setNickname', nick);
    }
    socket.on('loginSuccess', () => showScreen('screen-lobbies'));

    function createLobby() {
        const name = document.getElementById('create-name').value.trim();
        if (!name) return alert('Введите название');
        const password = document.getElementById('create-password').value.trim();
        const maxPlayers = document.getElementById('create-max').value;
        socket.emit('createLobby', { name, password, maxPlayers });
    }

    function filterLobbies() {
        const s = document.getElementById('input-search').value.toLowerCase();
        renderLobbies(allLobbies.filter(l => l.name.toLowerCase().includes(s)));
    }
    socket.on('updateLobbyList', (lobbies) => { allLobbies = lobbies; filterLobbies(); });

    function renderLobbies(lobbies) {
        const c = document.getElementById('lobbies-list');
        c.innerHTML = '';
        lobbies.forEach(l => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.innerHTML = `<span><b>${l.name}</b> ${l.hasPassword?'🔒':''} (${l.playersCount}/${l.maxPlayers})</span>
                <button onclick="joinLobby('${l.id}',${l.hasPassword})">Войти</button>`;
            c.appendChild(d);        });
        if (!lobbies.length) c.innerHTML = '<p style="padding:10px;text-align:center;">Нет доступных игр</p>';
    }

    function joinLobby(id, hasPass) {
        let password = '';
        if (hasPass) { password = prompt('Пароль:'); if (password === null) return; }
        socket.emit('joinLobby', { id, password });
    }

    socket.on('lobbyJoined', updateRoomUI);
    socket.on('lobbyUpdated', updateRoomUI);

    function updateRoomUI(lobby) {
        currentLobbyData = lobby;
        showScreen('screen-room');
        document.getElementById('room-name').innerText = `🏠 ${lobby.name}`;
        const isAdmin = lobby.admin === myId;
        document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
        document.getElementById('player-controls').classList.toggle('hidden', isAdmin);
        const pd = document.getElementById('room-players');
        pd.innerHTML = '';
        lobby.players.forEach(p => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.innerHTML = `<span>${p.name} ${p.id===lobby.admin?'👑':''}</span>`;
            if (isAdmin && p.id !== myId) {
                const b = document.createElement('button');
                b.className = 'btn-red'; b.innerText = 'Кик';
                b.onclick = () => socket.emit('kickPlayer', p.id);
                d.appendChild(b);
            }
            pd.appendChild(d);
        });
    }

    function leaveLobby() { socket.emit('leaveLobby'); showScreen('screen-lobbies'); }
    function disbandLobby() { socket.emit('disbandLobby'); }
    function startGame() { socket.emit('startGame'); }

    socket.on('lobbyDisbanded', () => { showScreen('screen-lobbies'); });
    socket.on('kicked', () => { showScreen('screen-lobbies'); });

    socket.on('gameStarted', (data) => {
        document.getElementById('app').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        myPlayerColor = data.myColor || '#00ff00';
        playersInGame = data.players || [];
        initGame();
    });
    function exitGame() {
        socket.emit('leaveGame');
        document.getElementById('game-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        showScreen('screen-lobbies');
        cleanupGame();
    }

    // ===================== THREE.JS GAME =====================
    let scene, camera, renderer;
    let clock;
    let gameActive = false;
    let myPlayerColor = '#00ff00';
    let playersInGame = [];

    // Player state
    let playerPos = new THREE.Vector3(0, 1.6, 5);
    let playerVel = new THREE.Vector3();
    let playerOnGround = true;
    let yaw = 0, pitch = 0;

    // Day/Night
    let dayTime = 0; // 0-720 seconds (6 min day + 6 min night)
    let dayNumber = 1;
    let isNight = false;
    const DAY_DURATION = 360; // 6 minutes in seconds
    let sunLight, ambientLight, skyColor;

    // Trees
    let trees = [];
    let stumps = [];

    // Campfire
    let campfire = null;
    let campfireHP = 100;
    let campfireLevel = 1;
    let campfireFireParts = [];
    let campfireLight = null;
    let campfireTimer = 0;

    // Inventory
    let hotbar = ['axe','bag',null,null,null,null,null,null,null];
    let activeSlot = 0;
    let inventoryItems = [];
    let bagItems = []; // items in bag (max 10)

    // Axe
    let axeMesh = null;
    let isAttacking = false;    let attackCooldown = 0;

    // Joystick
    let joystickActive = false;
    let joystickStartX = 0, joystickStartY = 0;
    let joystickDX = 0, joystickDY = 0;

    // Camera touch
    let camTouchId = null;
    let camLastX = 0, camLastY = 0;

    // Other players
    let otherPlayerMeshes = {};

    // Collect target
    let collectTarget = null;

    function initGame() {
        if (gameActive) return;
        gameActive = true;

        const container = document.getElementById('game-canvas');
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // Lights
        ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(50, 80, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -60;
        sunLight.shadow.camera.right = 60;
        sunLight.shadow.camera.top = 60;
        sunLight.shadow.camera.bottom = -60;
        scene.add(sunLight);
        // Ground - grass
        const groundGeo = new THREE.PlaneGeometry(200, 200, 20, 20);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d8a2d });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grass details
        for (let i = 0; i < 300; i++) {
            const gGeo = new THREE.PlaneGeometry(0.3, 0.5);
            const gMat = new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0x3a9e3a : 0x228B22, side: THREE.DoubleSide });
            const grass = new THREE.Mesh(gGeo, gMat);
            grass.position.set((Math.random()-0.5)*180, 0.25, (Math.random()-0.5)*180);
            grass.rotation.y = Math.random() * Math.PI;
            scene.add(grass);
        }

        // Generate trees
        generateTrees();

        // Create campfire at spawn
        createCampfire(new THREE.Vector3(0, 0, 0));

        // Create axe in hand
        createAxeMesh();

        // Sky
        scene.background = new THREE.Color(0x87CEEB);

        // Setup touch controls
        setupTouchControls();

        // Start game loop
        gameLoop();

        // Show attack button (axe is default)
        updateHotbarUI();
        document.getElementById('btn-attack').style.display = 'flex';
        document.getElementById('bag-counter').style.display = 'block';
    }

    function cleanupGame() {
        gameActive = false;
        if (renderer) {
            renderer.dispose();
            const container = document.getElementById('game-canvas');
            while(container.firstChild) container.removeChild(container.firstChild);
        }        scene = null; camera = null; renderer = null;
        trees = []; stumps = []; campfireFireParts = [];
        otherPlayerMeshes = {};
        bagItems = [];
        campfireHP = 100; campfireLevel = 1;
        dayTime = 0; dayNumber = 1; isNight = false;
    }

    // ===================== TREES =====================
    function generateTrees() {
        for (let i = 0; i < 60; i++) {
            let x = (Math.random()-0.5) * 160;
            let z = (Math.random()-0.5) * 160;
            // Don't place too close to spawn
            if (Math.sqrt(x*x+z*z) < 8) continue;
            createTree(x, z);
        }
    }

    function createTree(x, z) {
        const group = new THREE.Group();
        const h = 3 + Math.random()*3;
        const r = 0.2 + Math.random()*0.15;

        // Trunk
        const trunkGeo = new THREE.CylinderGeometry(r*0.7, r, h, 8);
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = h/2;
        trunk.castShadow = true;
        group.add(trunk);

        // Foliage (multiple cones)
        const colors = [0x228B22, 0x2E8B57, 0x006400, 0x32CD32];
        for (let j = 0; j < 3; j++) {
            const fGeo = new THREE.ConeGeometry(1.5 - j*0.3, 2.5 - j*0.3, 8);
            const fMat = new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
            const foliage = new THREE.Mesh(fGeo, fMat);
            foliage.position.y = h - 0.5 + j * 1.2;
            foliage.castShadow = true;
            group.add(foliage);
        }

        group.position.set(x, 0, z);
        group.userData = { type: 'tree', health: 3, sinking: false };
        scene.add(group);
        trees.push(group);
    }

    function createStump(pos) {        const group = new THREE.Group();

        // Stump base
        const stumpGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.4, 8);
        const stumpMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const stump = new THREE.Mesh(stumpGeo, stumpMat);
        stump.position.y = 0.2;
        group.add(stump);

        // Logs on ground
        for (let i = 0; i < 3; i++) {
            const logGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 6);
            const logMat = new THREE.MeshLambertMaterial({ color: 0xA0522D });
            const log = new THREE.Mesh(logGeo, logMat);
            log.rotation.z = Math.PI/2;
            log.position.set(Math.cos(i*2.1)*0.5, 0.12, Math.sin(i*2.1)*0.5);
            log.rotation.y = i * 1.2;
            group.add(log);
        }

        group.position.copy(pos);
        group.position.y = 0;
        group.userData = { type: 'stump', collected: false };
        scene.add(group);
        stumps.push(group);
    }

    // ===================== CAMPFIRE =====================
    function createCampfire(pos) {
        campfire = new THREE.Group();

        // Stones ring
        for (let i = 0; i < 8; i++) {
            const angle = (i/8)*Math.PI*2;
            const stoneGeo = new THREE.SphereGeometry(0.2, 6, 6);
            const stoneMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
            const stone = new THREE.Mesh(stoneGeo, stoneMat);
            stone.position.set(Math.cos(angle)*0.7, 0.1, Math.sin(angle)*0.7);
            stone.scale.y = 0.6;
            campfire.add(stone);
        }

        // Logs
        for (let i = 0; i < 4; i++) {
            const logGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.9, 6);
            const logMat = new THREE.MeshLambertMaterial({ color: 0x5C3317 });
            const log = new THREE.Mesh(logGeo, logMat);
            log.rotation.z = Math.PI/2;
            log.rotation.y = i * 0.8;
            log.position.y = 0.15 + i * 0.05;            campfire.add(log);
        }

        // Fire particles
        createFireParticles();

        // Light
        campfireLight = new THREE.PointLight(0xff6600, 2, 15);
        campfireLight.position.y = 1;
        campfire.add(campfireLight);

        campfire.position.copy(pos);
        campfire.position.y = 0;
        scene.add(campfire);
    }

    function createFireParticles() {
        campfireFireParts = [];
        for (let i = 0; i < 12; i++) {
            const size = 0.1 + Math.random()*0.15;
            const geo = new THREE.SphereGeometry(size, 6, 6);
            const mat = new THREE.MeshBasicMaterial({ 
                color: Math.random() > 0.5 ? 0xff4500 : 0xffaa00,
                transparent: true, opacity: 0.8 
            });
            const particle = new THREE.Mesh(geo, mat);
            particle.position.set(
                (Math.random()-0.5)*0.4,
                0.3 + Math.random()*0.8,
                (Math.random()-0.5)*0.4
            );
            particle.userData = { 
                baseY: particle.position.y,
                speed: 0.5 + Math.random()*1.5,
                offset: Math.random() * Math.PI * 2
            };
            campfire.add(particle);
            campfireFireParts.push(particle);
        }
    }

    function setCampfireActive(active) {
        campfireFireParts.forEach(p => p.visible = active);
        if (campfireLight) campfireLight.intensity = active ? (1 + campfireLevel * 0.5) : 0;
    }

    function updateCampfire(dt) {
        if (!campfire) return;

        // Animate fire        if (campfireHP > 0) {
            campfireFireParts.forEach(p => {
                const ud = p.userData;
                p.position.y = ud.baseY + Math.sin(clock.elapsedTime * ud.speed + ud.offset) * 0.2;
                p.position.x += (Math.random()-0.5)*0.01;
                p.position.z += (Math.random()-0.5)*0.01;
                p.material.opacity = 0.5 + Math.random()*0.4;
            });

            // HP drain based on level
            campfireTimer += dt;
            let drainInterval = 0.2; // level 1
            if (campfireLevel === 2) drainInterval = 0.35;
            else if (campfireLevel === 3) drainInterval = 0.5;
            else if (campfireLevel === 4) drainInterval = 0.7;
            else if (campfireLevel === 5) drainInterval = 0.9;
            else if (campfireLevel >= 6) drainInterval = 1.2;

            if (campfireTimer >= drainInterval) {
                campfireTimer = 0;
                campfireHP = Math.max(0, campfireHP - 1);
                if (campfireHP <= 0) {
                    setCampfireActive(false);
                }
            }

            // Light intensity flickers
            if (campfireLight) {
                campfireLight.intensity = (1 + campfireLevel * 0.5) * (0.8 + Math.random()*0.4);
            }
        }

        // Update UI
        const dist = playerPos.distanceTo(campfire.position);
        const cfInfo = document.getElementById('campfire-info');
        if (dist < 8) {
            cfInfo.style.display = 'block';
            document.getElementById('cf-level').innerText = campfireLevel;
            document.getElementById('cf-hp-text').innerText = `${campfireHP}/100 HP`;
            document.getElementById('campfire-hp-fill').style.width = campfireHP + '%';
        } else {
            cfInfo.style.display = 'none';
        }
    }

    // ===================== AXE =====================
    function createAxeMesh() {
        axeMesh = new THREE.Group();

        // Handle        const handleGeo = new THREE.CylinderGeometry(0.03, 0.035, 0.7, 6);
        const handleMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.rotation.x = -0.3;
        axeMesh.add(handle);

        // Axe head
        const headGeo = new THREE.BoxGeometry(0.25, 0.2, 0.05);
        const headMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0.1, 0.3, 0);
        axeMesh.add(head);

        // Blade edge
        const edgeGeo = new THREE.BoxGeometry(0.08, 0.22, 0.02);
        const edgeMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
        const edge = new THREE.Mesh(edgeGeo, edgeMat);
        edge.position.set(0.22, 0.3, 0);
        axeMesh.add(edge);

        axeMesh.position.set(0.4, -0.35, -0.5);
        axeMesh.rotation.set(0, 0, 0.3);
        camera.add(axeMesh);
        scene.add(camera);
    }

    // ===================== ATTACK =====================
    function onAttack() {
        if (isAttacking || attackCooldown > 0) return;
        if (hotbar[activeSlot] !== 'axe') return;
        isAttacking = true;
        attackCooldown = 0;

        // Animate axe swing
        let t = 0;
        const swingDuration = 400; // ms
        const origRot = { x: 0, y: 0, z: 0.3 };

        function swingAnim() {
            t += 16;
            const progress = t / swingDuration;

            if (progress < 0.5) {
                // Swing forward
                const p = progress * 2;
                axeMesh.rotation.x = origRot.x + p * 1.5;
                axeMesh.rotation.z = origRot.z - p * 0.8;
                axeMesh.position.z = -0.5 + p * 0.2;
            } else if (progress < 1.0) {
                // Swing back                const p = (progress - 0.5) * 2;
                axeMesh.rotation.x = origRot.x + 1.5 - p * 1.5;
                axeMesh.rotation.z = origRot.z - 0.8 + p * 0.8;
                axeMesh.position.z = -0.5 + 0.2 - p * 0.2;
            } else {
                // Reset
                axeMesh.rotation.set(origRot.x, origRot.y, origRot.z);
                axeMesh.position.z = -0.5;
                isAttacking = false;
                attackCooldown = 0.3;

                // Check tree hit
                checkTreeHit();
                return;
            }
            requestAnimationFrame(swingAnim);
        }
        swingAnim();
    }

    function checkTreeHit() {
        const forward = new THREE.Vector3(0, 0, -1);
        forward.applyQuaternion(camera.quaternion);
        const rayOrigin = playerPos.clone();
        rayOrigin.y = 1.5;

        for (let tree of trees) {
            if (tree.userData.sinking) continue;
            const dist = rayOrigin.distanceTo(tree.position);
            if (dist < 3.5) {
                // Check direction
                const toTree = tree.position.clone().sub(rayOrigin).normalize();
                const dot = forward.dot(toTree);
                if (dot > 0.5) {
                    tree.userData.health--;
                    if (tree.userData.health <= 0) {
                        // Start sinking animation
                        tree.userData.sinking = true;
                        tree.userData.sinkSpeed = 0.02;
                        // Create stump at this position
                        setTimeout(() => {
                            createStump(tree.position.clone());
                        }, 1500);
                    }
                    break;
                }
            }
        }
    }
    // ===================== JUMP =====================
    function onJump() {
        if (playerOnGround) {
            playerVel.y = 6;
            playerOnGround = false;
        }
    }

    // ===================== COLLECT =====================
    function onCollect() {
        if (!collectTarget) return;
        if (bagItems.length >= 10) return;

        bagItems.push('log');
        collectTarget.userData.collected = true;
        scene.remove(collectTarget);
        stumps = stumps.filter(s => s !== collectTarget);
        collectTarget = null;

        updateBagUI();
    }

    function onDrop() {
        if (bagItems.length === 0) return;
        bagItems.pop();
        updateBagUI();

        // Drop a log on the ground
        const dropPos = playerPos.clone();
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        dropPos.add(forward.multiplyScalar(2));
        dropPos.y = 0.15;

        const logGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 6);
        const logMat = new THREE.MeshLambertMaterial({ color: 0xA0522D });
        const log = new THREE.Mesh(logGeo, logMat);
        log.position.copy(dropPos);
        log.rotation.z = Math.PI/2;
        log.castShadow = true;
        scene.add(log);

        // If near campfire, add fuel
        if (campfire && dropPos.distanceTo(campfire.position) < 3) {
            campfireHP = Math.min(100, campfireHP + 15);
            if (campfireLevel < 6) campfireLevel++;
            setCampfireActive(true);
        }
    }

    function updateBagUI() {        document.getElementById('bag-count').innerText = bagItems.length;
        document.getElementById('btn-drop').style.display = bagItems.length > 0 ? 'block' : 'none';
    }

    // ===================== INVENTORY =====================
    function toggleInventory() {
        const panel = document.getElementById('inventory-panel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            panel.style.display = 'block';
            renderInventory();
        }
    }

    function renderInventory() {
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        // Show 20 slots (infinite but visual)
        const totalSlots = Math.max(20, inventoryItems.length + 5);
        for (let i = 0; i < totalSlots; i++) {
            const slot = document.createElement('div');
            slot.className = 'inv-slot';
            if (inventoryItems[i]) {
                slot.innerText = inventoryItems[i] === 'log' ? '🪵' : '?';
            }
            grid.appendChild(slot);
        }
    }

    function updateHotbarUI() {
        for (let i = 0; i < 9; i++) {
            const el = document.getElementById('slot-'+i);
            el.classList.toggle('active', i === activeSlot);
            const item = hotbar[i];
            if (item === 'axe') el.innerText = '🪓';
            else if (item === 'bag') el.innerText = '🎒';
            else if (item === 'log') el.innerText = '🪵';
            else el.innerText = '';
        }

        // Show/hide attack button
        document.getElementById('btn-attack').style.display = (hotbar[activeSlot] === 'axe') ? 'flex' : 'none';
    }

    // Hotbar click
    document.querySelectorAll('.slot').forEach((el, idx) => {
        el.addEventListener('touchstart', (e) => { e.preventDefault(); activeSlot = idx; updateHotbarUI(); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); activeSlot = idx; updateHotbarUI(); });
    });
    // ===================== TOUCH CONTROLS =====================
    function setupTouchControls() {
        const joyZone = document.getElementById('joystick-zone');
        const rightZone = document.getElementById('right-zone');
        const joyBase = document.getElementById('joystick-base');
        const joyThumb = document.getElementById('joystick-thumb');

        // Joystick
        let joyTouchId = null;

        joyZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (joyTouchId !== null) return;
            const touch = e.changedTouches[0];
            joyTouchId = touch.identifier;
            joystickActive = true;
            joystickStartX = touch.clientX;
            joystickStartY = touch.clientY;
            joyBase.style.display = 'block';
            joyBase.style.left = (touch.clientX - 50) + 'px';
            joyBase.style.top = (touch.clientY - 50) + 'px';
            joyThumb.style.left = '30px';
            joyThumb.style.top = '30px';
            joystickDX = 0;
            joystickDY = 0;
        });

        joyZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                if (touch.identifier === joyTouchId) {
                    let dx = touch.clientX - joystickStartX;
                    let dy = touch.clientY - joystickStartY;
                    const maxDist = 40;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > maxDist) {
                        dx = dx/dist * maxDist;
                        dy = dy/dist * maxDist;
                    }
                    joyThumb.style.left = (30 + dx) + 'px';
                    joyThumb.style.top = (30 + dy) + 'px';
                    joystickDX = dx / maxDist;
                    joystickDY = dy / maxDist;
                }
            }
        });

        const endJoy = (e) => {
            for (let touch of e.changedTouches) {                if (touch.identifier === joyTouchId) {
                    joyTouchId = null;
                    joystickActive = false;
                    joystickDX = 0;
                    joystickDY = 0;
                    joyBase.style.display = 'none';
                }
            }
        };
        joyZone.addEventListener('touchend', endJoy);
        joyZone.addEventListener('touchcancel', endJoy);

        // Camera (right zone)
        rightZone.addEventListener('touchstart', (e) => {
            // Don't interfere with buttons
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && (target.id === 'btn-attack' || target.id === 'btn-jump' || target.id === 'btn-collect' || target.id === 'btn-drop')) return;
            
            camTouchId = touch.identifier;
            camLastX = touch.clientX;
            camLastY = touch.clientY;
        });

        rightZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                if (touch.identifier === camTouchId) {
                    const dx = touch.clientX - camLastX;
                    const dy = touch.clientY - camLastY;
                    yaw -= dx * 0.004;
                    pitch -= dy * 0.004;
                    pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
                    camLastX = touch.clientX;
                    camLastY = touch.clientY;
                }
            }
        });

        const endCam = (e) => {
            for (let touch of e.changedTouches) {
                if (touch.identifier === camTouchId) {
                    camTouchId = null;
                }
            }
        };
        rightZone.addEventListener('touchend', endCam);
        rightZone.addEventListener('touchcancel', endCam);

        // Mouse fallback for PC testing        let mouseDown = false;
        rightZone.addEventListener('mousedown', (e) => {
            mouseDown = true;
            camLastX = e.clientX;
            camLastY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const dx = e.clientX - camLastX;
            const dy = e.clientY - camLastY;
            yaw -= dx * 0.003;
            pitch -= dy * 0.003;
            pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            camLastX = e.clientX;
            camLastY = e.clientY;
        });
        window.addEventListener('mouseup', () => mouseDown = false);

        // Keyboard for PC testing
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; if(e.code==='Space') onJump(); });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window._keys = keys;
    }

    // ===================== DAY/NIGHT =====================
    function updateDayNight(dt) {
        dayTime += dt;
        const cycleDuration = DAY_DURATION * 2; // day + night

        if (dayTime >= cycleDuration) {
            dayTime -= cycleDuration;
            dayNumber++;
        }

        isNight = dayTime >= DAY_DURATION;
        let t; // 0 = noon, 1 = midnight
        if (!isNight) {
            t = dayTime / DAY_DURATION; // 0 to 1 during day
        } else {
            t = 1.0; // full night
        }

        // Sky color
        if (isNight) {
            const nightProgress = (dayTime - DAY_DURATION) / DAY_DURATION;
            scene.background = new THREE.Color().lerpColors(new THREE.Color(0x1a0a2e), new THREE.Color(0x0a0a1a), nightProgress);
            ambientLight.intensity = 0.15;
            sunLight.intensity = 0.1;
            scene.fog.color = new THREE.Color(0x0a0a1a);        } else {
            const dayProgress = dayTime / DAY_DURATION;
            if (dayProgress < 0.1) {
                // Dawn
                const p = dayProgress / 0.1;
                scene.background = new THREE.Color().lerpColors(new THREE.Color(0xFF6B35), new THREE.Color(0x87CEEB), p);
                ambientLight.intensity = 0.2 + p * 0.4;
                sunLight.intensity = 0.3 + p * 0.7;
            } else if (dayProgress > 0.9) {
                // Dusk
                const p = (dayProgress - 0.9) / 0.1;
                scene.background = new THREE.Color().lerpColors(new THREE.Color(0x87CEEB), new THREE.Color(0xFF4500), p);
                ambientLight.intensity = 0.6 - p * 0.4;
                sunLight.intensity = 1.0 - p * 0.7;
            } else {
                scene.background = new THREE.Color(0x87CEEB);
                ambientLight.intensity = 0.6;
                sunLight.intensity = 1.0;
            }
            scene.fog.color = scene.background;
        }

        // Update UI
        const timeStr = isNight ? '🌙 Ночь' : '☀️ Утро';
        document.getElementById('day-counter').innerText = `День ${dayNumber} | ${timeStr}`;
    }

    // ===================== GAME LOOP =====================
    function gameLoop() {
        if (!gameActive) return;
        requestAnimationFrame(gameLoop);

        const dt = Math.min(clock.getDelta(), 0.05);

        // Attack cooldown
        if (attackCooldown > 0) attackCooldown -= dt;

        // Player movement
        const speed = 5;
        const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

        let moveX = 0, moveZ = 0;

        // Joystick input
        if (joystickActive) {
            moveX = joystickDX;
            moveZ = joystickDY;
        }
        // Keyboard input (PC)
        if (window._keys) {
            if (window._keys['KeyW']) moveZ = -1;
            if (window._keys['KeyS']) moveZ = 1;
            if (window._keys['KeyA']) moveX = -1;
            if (window._keys['KeyD']) moveX = 1;
        }

        const moveDir = new THREE.Vector3();
        moveDir.add(forward.clone().multiplyScalar(-moveZ));
        moveDir.add(right.clone().multiplyScalar(moveX));
        if (moveDir.length() > 0) moveDir.normalize();

        playerPos.x += moveDir.x * speed * dt;
        playerPos.z += moveDir.z * speed * dt;

        // Gravity & jump
        playerVel.y -= 15 * dt;
        playerPos.y += playerVel.y * dt;
        if (playerPos.y <= 1.6) {
            playerPos.y = 1.6;
            playerVel.y = 0;
            playerOnGround = true;
        }

        // Clamp to world
        playerPos.x = Math.max(-95, Math.min(95, playerPos.x));
        playerPos.z = Math.max(-95, Math.min(95, playerPos.z));

        // Update camera
        camera.position.copy(playerPos);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        // Tree sinking animation
        for (let tree of trees) {
            if (tree.userData.sinking) {
                tree.position.y -= tree.userData.sinkSpeed;
                if (tree.position.y < -5) {
                    scene.remove(tree);
                    trees = trees.filter(t => t !== tree);
                }
            }
        }

        // Check collect proximity
        collectTarget = null;
        for (let stump of stumps) {
            if (stump.userData.collected) continue;            const dist = playerPos.distanceTo(stump.position);
            if (dist < 2.5) {
                collectTarget = stump;
                break;
            }
        }
        document.getElementById('btn-collect').style.display = (collectTarget && bagItems.length < 10) ? 'block' : 'none';

        // Day/Night
        updateDayNight(dt);

        // Campfire
        updateCampfire(dt);

        // Send position to server
        socket.emit('playerMove', { x: playerPos.x, y: playerPos.y, z: playerPos.z, yaw, pitch });

        // Render
        renderer.render(scene, camera);
    }

    // Receive other players positions
    socket.on('playerPositions', (players) => {
        if (!scene) return;
        const currentIds = new Set();
        players.forEach(p => {
            if (p.id === myId) return;
            currentIds.add(p.id);

            if (!otherPlayerMeshes[p.id]) {
                // Create player model
                const group = new THREE.Group();
                const color = p.color || '#ffffff';

                // Body
                const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
                const bodyMat = new THREE.MeshLambertMaterial({ color: new THREE.Color(color) });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 1.0;
                group.add(body);

                // Head
                const headGeo = new THREE.SphereGeometry(0.25, 8, 8);
                const headMat = new THREE.MeshLambertMaterial({ color: 0xFFDBB4 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.85;
                group.add(head);

                // Name tag (simple)
                const canvas = document.createElement('canvas');                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, 256, 64);
                ctx.fillStyle = 'white';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.name || 'Player', 128, 40);
                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.position.y = 2.3;
                sprite.scale.set(2, 0.5, 1);
                group.add(sprite);

                group.castShadow = true;
                scene.add(group);
                otherPlayerMeshes[p.id] = group;
            }

            otherPlayerMeshes[p.id].position.set(p.x, 0, p.z);
            otherPlayerMeshes[p.id].rotation.y = -p.yaw;
        });

        // Remove disconnected players
        Object.keys(otherPlayerMeshes).forEach(id => {
            if (!currentIds.has(id)) {
                scene.remove(otherPlayerMeshes[id]);
                delete otherPlayerMeshes[id];
            }
        });
    });

    // Resize
    window.addEventListener('resize', () => {
        if (!camera || !renderer) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
